<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payabli Checkout</title>
  <script src="https://embedded-component-sandbox.payabli.com/component.js"></script>
</head>
<body>
  <div id="pay-component-1"></div>
  <script>
    function renderPayabli(token, entryPoint, amount) {
      new PayabliComponent({
        type: 'methodEmbedded',
        rootContainer: 'pay-component-1',
        defaultOpen: 'card',
        token,
        entryPoint,
        card: {
          enabled: true,
          visa: true, mastercard: true, amex: true, discover: true, jcb: true, diners: true,
          inputs: {},
        },
        ach: { enabled: false, checking: true, savings: true },
        customerData: {
          customerNumber: '00001',
          firstName: 'John',
          lastName: 'Doe',
        },
        amount,
        country: 'us',
      });
    }
    // Listen for React Native postMessage
    document.addEventListener('message', function(event) {
      try {
        var data = JSON.parse(event.data);
        renderPayabli(data.token, data.entryPoint, data.amount);
      } catch (e) {}
    });
    // For web debugging, render with defaults
    if (!window.ReactNativeWebView) {
      renderPayabli('YOUR_TOKEN', 'YOUR_ENTRY_POINT', '100');
    }
  </script>
</body>
</html>
